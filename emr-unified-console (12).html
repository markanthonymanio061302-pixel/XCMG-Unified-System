<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bigben Group EMR — Unified Console</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{--maroon:#7B1C1C;--maroon-deep:#5E1414;--gold:#C9A227;--gold-light:#E8C766;--gold-soft:#F3E6Bd;--bg:#f3f2f0;--ink:#2b2b2b;--muted:#7a7570;--line:#e6e2db;--ok:#2e7d32;--warn:#b8860b;--bad:#b3261e;--shadow:0 1px 3px rgba(0,0,0,.08),0 6px 18px rgba(94,20,20,.06);}
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink);display:flex;flex-direction:column;font-size:14px}
  .hidden{display:none!important}

  #gate{position:fixed;inset:0;background:linear-gradient(135deg,var(--maroon-deep),var(--maroon));display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
  .gate-card{background:#fff;border-radius:14px;padding:34px 30px;width:100%;max-width:370px;box-shadow:0 20px 60px rgba(0,0,0,.35);text-align:center}
  .gate-card .mark{width:56px;height:56px;border-radius:12px;background:var(--maroon);color:var(--gold-light);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;margin:0 auto 14px;border:2px solid var(--gold)}
  .gate-card h2{margin:0;color:var(--maroon);font-size:18px}
  .gate-card p{color:#7a7570;font-size:12px;margin:6px 0 20px}
  .gate-card input{width:100%;text-align:center;letter-spacing:.3em;font-size:18px;padding:12px;border:1px solid var(--line);border-radius:8px}
  .gate-card input:focus{outline:2px solid var(--gold);border-color:var(--gold)}
  .gate-err{color:#b3261e;font-size:12px;font-weight:700;height:16px;margin-top:8px}
  .gbtn{background:var(--gold);color:#3a2c00;border:none;padding:11px 16px;border-radius:8px;font-size:14px;font-weight:800;cursor:pointer;width:100%;margin-top:12px}
  .gbtn:hover{background:var(--gold-light)}

  header{background:var(--maroon);color:#fff;display:flex;align-items:center;gap:12px;padding:0 16px;height:58px;flex:0 0 auto;box-shadow:0 2px 10px rgba(94,20,20,.2);z-index:6}
  .logo{width:38px;height:38px;border-radius:9px;background:#fff;color:var(--maroon);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;border:2px solid var(--gold);flex:0 0 auto}
  .brand{flex:0 0 auto}
  .brand .t{font-size:14px;font-weight:800}
  .brand .s{font-size:11px;color:var(--gold-light);font-weight:700;letter-spacing:.05em;text-transform:uppercase}
  .gsearch{position:relative;flex:1;max-width:420px;margin:0 auto}
  .gsearch input{width:100%;padding:8px 12px;border-radius:20px;border:none;font-size:13px;background:rgba(255,255,255,.16);color:#fff}
  .gsearch input::placeholder{color:rgba(255,255,255,.7)}
  .gsearch input:focus{outline:2px solid var(--gold);background:rgba(255,255,255,.22)}
  .gs-results{position:absolute;left:0;right:0;top:42px;background:#fff;color:var(--ink);border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,.25);max-height:340px;overflow:auto;z-index:30}
  .gs-grp{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:8px 12px 4px;background:#faf8f5}
  .gs-item{padding:8px 12px;border-bottom:1px solid var(--line);cursor:pointer;font-size:13px}
  .gs-item:hover{background:var(--gold-soft)}
  .gs-item .sub{font-size:11px;color:var(--muted)}
  .gs-empty{padding:14px 12px;color:var(--muted);font-size:12px}
  .status{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);white-space:nowrap}
  .status .dot{width:8px;height:8px;border-radius:50%;background:var(--gold-light)}
  .status.live{background:var(--ok);border-color:var(--ok)}.status.live .dot{background:#cdebcd}
  .status.off{background:var(--bad);border-color:var(--bad)}.status.off .dot{background:#f3c9c5}
  .sync{font-size:10px;color:var(--gold-light);white-space:nowrap}
  .lock{background:transparent;border:1px solid rgba(255,255,255,.4);color:#fff;padding:6px 12px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer}
  .lock:hover{background:rgba(255,255,255,.12)}

  .switch{background:var(--maroon-deep);display:flex;gap:2px;padding:0 16px;flex:0 0 auto;overflow-x:auto;z-index:4}
  .mod{background:transparent;border:none;color:rgba(255,255,255,.72);padding:12px 18px;font-size:13px;font-weight:700;border-bottom:3px solid transparent;white-space:nowrap;cursor:pointer}
  .mod:hover{color:#fff}
  .mod.active{color:var(--gold-light);border-bottom-color:var(--gold)}

  .stage{flex:1 1 auto;position:relative;background:var(--bg)}
  iframe{position:absolute;inset:0;width:100%;height:100%;border:none;background:#fff}
  #ov{position:absolute;inset:0;overflow:auto;padding:22px 20px 50px}
  .ov-wrap{max-width:1200px;margin:0 auto}
  .ov-title{font-size:18px;color:var(--maroon);font-weight:800;margin:0 0 12px}
  .ov-filter{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:0 0 16px}
  .ov-filter select,.ov-filter input{padding:7px 10px;border:1px solid var(--line);border-radius:7px;font-size:13px;background:#fff;color:var(--ink)}
  .ov-filter .ovf-to{color:var(--muted);font-size:12px}
  .ov-filter .ovf-clear{background:#fff;border:1px solid var(--maroon);color:var(--maroon);padding:7px 12px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:13px;margin-bottom:18px}
  .kpi{background:#fff;border:1px solid var(--line);border-radius:12px;padding:15px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--gold)}
  .kpi.ev::before{background:var(--maroon)}.kpi.rep::before{background:#6a3d8f}
  .kpi .k{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em}
  .kpi .v{font-size:21px;font-weight:800;color:var(--maroon);margin-top:5px}
  .kpi .x{font-size:11px;color:var(--muted);margin-top:2px}
  .ov-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow)}
  .card .hd{padding:13px 16px;border-bottom:1px solid var(--line);font-weight:800;color:var(--maroon);font-size:14px}
  .card .bd{padding:16px}
  .chart-wrap{height:260px;position:relative}

  /* skeleton */
  .sk{background:linear-gradient(90deg,#ececec 25%,#f5f5f5 37%,#ececec 63%);background-size:400% 100%;animation:sh 1.3s ease infinite;border-radius:8px}
  @keyframes sh{0%{background-position:100% 0}100%{background-position:-100% 0}}
  .sk-kpi{height:86px}
  .sk-chart{height:292px}
</style>
</head>
<body>

<div id="gate">
  <div class="gate-card">
    <div class="mark">BBG</div>
    <h2>Bigben Group EMR Console</h2>
    <p>XCMG EV Sales &amp; Client Repairs Billing</p>
    <input id="pin" type="password" inputmode="numeric" maxlength="12" placeholder="PIN" autocomplete="off" />
    <div class="gate-err" id="err"></div>
    <button class="gbtn" onclick="unlock()">Unlock</button>
  </div>
</div>

<div id="app" class="hidden" style="flex:1;display:flex;flex-direction:column;min-height:0">
  <header>
    <div class="logo">BBG</div>
    <div class="brand"><div class="t">Bigben Group EMR</div><div class="s">Unified Console</div></div>
    <div class="gsearch">
      <input id="gs" placeholder="Search clients, deals, repair JOs…" oninput="gsearch()" autocomplete="off" />
      <div id="gsResults" class="gs-results hidden"></div>
    </div>
    <div class="status" id="statusPill"><span class="dot"></span><span id="statusText">Connecting…</span></div>
    <div class="sync" id="lastSync">—</div>
    <button class="lock" onclick="lock()">Lock</button>
  </header>

  <div class="switch">
    <button class="mod active" data-m="ov" onclick="openModule('ov')">Overview</button>
    <button class="mod" data-m="xcmg" onclick="openModule('xcmg')">XCMG EV Sales &amp; Billing</button>
    <button class="mod" data-m="jo" onclick="openModule('jo')">Client Repairs Billing</button>
  </div>

  <div class="stage">
    <!-- OVERVIEW -->
    <section id="ov">
      <div class="ov-wrap">
        <h1 class="ov-title">Combined Overview — EV Sales &amp; Repairs</h1>
        <div class="ov-filter">
          <select id="ovClient" onchange="renderOverview()"><option value="">All clients</option></select>
          <input id="ovFrom" type="date" onchange="renderOverview()" title="From date">
          <span class="ovf-to">to</span>
          <input id="ovTo" type="date" onchange="renderOverview()" title="To date">
          <button class="ovf-clear" onclick="clearOvFilter()">Clear</button>
        </div>
        <div class="kpis" id="ovKpis"></div>
        <div class="ov-grid">
          <div class="card"><div class="hd">Revenue Split</div><div class="bd"><div class="chart-wrap"><canvas id="ovSplit"></canvas></div></div></div>
          <div class="card"><div class="hd">Monthly Revenue — EV vs Repairs</div><div class="bd"><div class="chart-wrap"><canvas id="ovTrend"></canvas></div></div></div>
        </div>
      </div>
    </section>
    <!-- MODULES -->
    <iframe id="frame-xcmg" class="hidden" title="XCMG EV Sales & Billing"></iframe>
    <iframe id="frame-jo" class="hidden" title="Client Repairs Billing"></iframe>
  </div>
</div>

const loaded = { xcmg:false, jo:false };

const PESO = n => "\u20b1"+(Number(n)||0).toLocaleString("en-PH",{minimumFractionDigits:0,maximumFractionDigits:0});
function decodeB64(b64){const bin=atob(b64);const bytes=Uint8Array.from(bin,c=>c.charCodeAt(0));return new TextDecoder("utf-8").decode(bytes);}

function unlock(){
  if(document.getElementById("pin").value.trim()===ADMIN_PIN){
    document.getElementById("gate").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    showSkeleton(); connectFirestore(); startClock(); openModule("ov");
  }else{document.getElementById("err").textContent="Incorrect PIN. Try again.";document.getElementById("pin").value="";}
}
document.getElementById("pin").addEventListener("keydown",e=>{if(e.key==="Enter")unlock();});
function lock(){document.getElementById("app").classList.add("hidden");document.getElementById("gate").classList.remove("hidden");document.getElementById("pin").value="";document.getElementById("err").textContent="";}

function openModule(m){
  document.querySelectorAll(".mod").forEach(b=>b.classList.toggle("active",b.dataset.m===m));
  document.getElementById("ov").classList.toggle("hidden",m!=="ov");
  ["xcmg","jo"].forEach(k=>document.getElementById("frame-"+k).classList.toggle("hidden",k!==m));
  if(m!=="ov" && !loaded[m]){
    const f=document.getElementById("frame-"+m);
    f.srcdoc=decodeB64(MODULES[m]);
    if(m==="jo")f.addEventListener("load",()=>relayClients(),{once:true});
    loaded[m]=true;
  }
  if(m==="jo")setTimeout(relayClients,600);
}

/* ===== Firestore (parent owns connection) ===== */
let db=null, evDeals=[], evClients=[], repairs=[];
const seen={deals:false,jos:false};
function setStatus(state){
  const p=document.getElementById("statusPill"),t=document.getElementById("statusText");
  p.classList.remove("live","off");
  if(state==="live"){p.classList.add("live");t.textContent="Live";}
  else if(state==="off"){p.classList.add("off");t.textContent="Offline";}
  else t.textContent="Connecting…";
}
let clockOn=false;
function startClock(){
  if(clockOn)return; clockOn=true;
  const el=document.getElementById("lastSync");
  function tick(){const d=new Date();el.textContent=d.toLocaleDateString(undefined,{month:"short",day:"numeric"})+" · "+d.toLocaleTimeString();}
  tick(); setInterval(tick,1000);
}
function connectFirestore(){
  if(db){setStatus("live");ensureCanvases();renderOverview();return;}
  if(typeof firebase==="undefined"){setStatus("off");ensureCanvases();renderOverview();return;}
  try{
    firebase.initializeApp(firebaseConfig); db=firebase.firestore();
    const onErr=()=>{setStatus("off");hideSkeleton();};
    db.collection("xcmg_deals").onSnapshot(s=>{evDeals=s.docs.map(d=>d.data());seen.deals=true;setStatus("live");renderOverview();maybeHideSkeleton();},onErr);
    db.collection("xcmg_clients").onSnapshot(s=>{evClients=s.docs.map(d=>d.data());setStatus("live");renderOverview();relayClients();},onErr);
    db.collection("jos").onSnapshot(s=>{repairs=s.docs.map(d=>d.data());seen.jos=true;setStatus("live");renderOverview();maybeHideSkeleton();},onErr);
    setTimeout(()=>{ if(!seen.deals&&!seen.jos)setStatus("off"); ensureCanvases(); renderOverview(); },9000);
  }catch(e){console.error(e);setStatus("off");hideSkeleton();}
}
function relayClients(){
  const names=[...new Set([...evClients.map(c=>c&&c.name),...evDeals.map(d=>d&&d.client)].filter(Boolean))].sort();
  const f=document.getElementById("frame-jo");
  if(f&&f.contentWindow&&names.length)f.contentWindow.postMessage({type:"xcmg-clients",names},"*");
}

/* ===== Overview ===== */
function evCalc(d){const contract=(d.price||0)*(d.qty||0);return{contract,profit:contract-((d.cost||0)*(d.qty||0)),balance:contract-(d.paid||0),qty:d.qty||0};}
function toISO(v){
  if(!v) return "";
  v=String(v).trim();
  if(/^\d{4}-\d{2}-\d{2}/.test(v)) return v.slice(0,10);
  var m=v.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(m) return m[3]+"-"+("0"+m[1]).slice(-2)+"-"+("0"+m[2]).slice(-2);
  var d=new Date(v); return isNaN(d)?"":d.toISOString().slice(0,10);
}
function fillOvClients(){
  var sel=document.getElementById("ovClient"); if(!sel) return; var cur=sel.value;
  var names=Array.from(new Set([].concat(evClients.map(function(c){return c&&c.name;}),evDeals.map(function(d){return d&&d.client;}),repairs.map(function(j){return j&&j.bu;})).filter(Boolean))).sort(function(a,b){return String(a).localeCompare(String(b));});
  sel.innerHTML='<option value="">All clients</option>'+names.map(function(n){return '<option value="'+String(n).replace(/"/g,"&quot;")+'">'+String(n).replace(/</g,"&lt;")+'</option>';}).join("");
  if(cur) sel.value=cur;
}
function clearOvFilter(){["ovClient","ovFrom","ovTo"].forEach(function(id){var el=document.getElementById(id);if(el)el.value="";});renderOverview();}
function monthKey(v){
  if(!v) return "";
  v=String(v).trim();
  if(/^\d{4}-\d{2}/.test(v)) return v.slice(0,7);
  var m=v.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(m) return m[3]+"-"+("0"+m[1]).slice(-2);
  var d=new Date(v); return isNaN(d)?"":d.toISOString().slice(0,7);
}
function ensureCanvases(){
  const w=document.querySelectorAll("#ov .chart-wrap");
  if(w[0]&&!w[0].querySelector("canvas"))w[0].innerHTML='<canvas id="ovSplit"></canvas>';
  if(w[1]&&!w[1].querySelector("canvas"))w[1].innerHTML='<canvas id="ovTrend"></canvas>';
}
function renderOverview(){
  fillOvClients();
  var _fc=(document.getElementById("ovClient")||{}).value||"";
  var _ff=(document.getElementById("ovFrom")||{}).value||"";
  var _ft=(document.getElementById("ovTo")||{}).value||"";
  function _inRange(dt){var iso=toISO(dt); if(_ff&&(!iso||iso<_ff))return false; if(_ft&&(!iso||iso>_ft))return false; return true;}
  var dealsF=evDeals.filter(function(d){return (!_fc||d.client===_fc)&&_inRange(d.date);});
  var repairsF=repairs.filter(function(j){return (!_fc||(j.bu||"")===_fc)&&_inRange(j.date);});
  let units=0,evSales=0,evProfit=0,evRec=0;
  dealsF.forEach(d=>{const c=evCalc(d);units+=c.qty;evSales+=c.contract;evProfit+=c.profit;if(c.balance>0)evRec+=c.balance;});
  let repRev=0;repairsF.forEach(j=>repRev+=(j.laborCost||0));
  const repJOs=repairsF.length, total=evSales+repRev, clientCount=(new Set([...dealsF.map(d=>d&&d.client),...repairsF.map(j=>j&&j.bu)].filter(Boolean)).size)||evClients.length;
  document.getElementById("ovKpis").innerHTML=[
    ["Total Revenue",PESO(total),"EV sales + repairs",""],
    ["EV Sales",PESO(evSales),units+" units","ev"],
    ["EV Profit",PESO(evProfit),"sales \u2212 cost","ev"],
    ["EV Receivables",PESO(evRec),"outstanding","ev"],
    ["Repair Revenue",PESO(repRev),repJOs+" job orders","rep"],
    ["Repair JOs",repJOs,"billed","rep"],
    ["Clients",clientCount,"shared directory",""],
    ["EV Deals",evDeals.length,"total",""]
  ].map(k=>`<div class="kpi ${k[3]}"><div class="k">${k[0]}</div><div class="v">${k[1]}</div><div class="x">${k[2]}</div></div>`).join("");

  ensureCanvases();
  drawChart("ovSplit","doughnut",{labels:["EV Sales","Repair Revenue"],datasets:[{data:[evSales,repRev],backgroundColor:["#7B1C1C","#6a3d8f"]}]},{cutout:"58%"});
  const months={};
  dealsF.forEach(d=>{const m=monthKey(d.date);if(!m)return;(months[m]=months[m]||{ev:0,rep:0}).ev+=evCalc(d).contract;});
  repairsF.forEach(j=>{const m=monthKey(j.date);if(!m)return;(months[m]=months[m]||{ev:0,rep:0}).rep+=(j.laborCost||0);});
  const keys=Object.keys(months).sort();
  drawChart("ovTrend","bar",{labels:keys,datasets:[{label:"EV Sales",data:keys.map(k=>months[k].ev),backgroundColor:"#7B1C1C"},{label:"Repairs",data:keys.map(k=>months[k].rep),backgroundColor:"#6a3d8f"}]},{scales:{x:{stacked:true},y:{stacked:true}}});
}
const charts={};
function drawChart(id,type,data,extra){const ctx=document.getElementById(id);if(!ctx||typeof Chart==="undefined")return;if(charts[id])charts[id].destroy();charts[id]=new Chart(ctx,{type,data,options:Object.assign({responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{family:"Arial",size:11}}}}},extra)});}

/* ===== Skeleton ===== */
function showSkeleton(){
  document.getElementById("ovKpis").innerHTML=Array(8).fill('<div class="sk sk-kpi"></div>').join("");
  document.querySelectorAll("#ov .chart-wrap").forEach(c=>c.innerHTML='<div class="sk sk-chart"></div>');
}
function hideSkeleton(){
  if(!document.querySelector("#ovKpis .sk"))return;
  document.getElementById("ovKpis").innerHTML="";
  document.querySelectorAll("#ov .chart-wrap").forEach((c,i)=>c.innerHTML='<canvas id="'+(i===0?"ovSplit":"ovTrend")+'"></canvas>');
  renderOverview();
}
function maybeHideSkeleton(){ if(seen.deals&&seen.jos)hideSkeleton(); }

/* ===== Global search ===== */
function gsearch(){
  const q=document.getElementById("gs").value.trim().toLowerCase();
  const box=document.getElementById("gsResults");
  if(!q){box.classList.add("hidden");return;}
  const ev=evDeals.filter(d=>((d.client||"")+" "+(d.model||"")+" "+(d.serial||"")).toLowerCase().includes(q)).slice(0,6);
  const cl=evClients.filter(c=>(c.name||"").toLowerCase().includes(q)).slice(0,6);
  const rp=repairs.filter(j=>((j.bu||"")+" "+(j.joNum||"")+" "+(j.equip||"")+" "+(j.work||"")).toLowerCase().includes(q)).slice(0,6);
  let html="";
  if(cl.length){html+='<div class="gs-grp">Clients</div>'+cl.map(c=>`<div class="gs-item" onclick="jump('xcmg')"><b>${esc(c.name)}</b><div class="sub">${esc(c.contact||"client")}</div></div>`).join("");}
  if(ev.length){html+='<div class="gs-grp">XCMG Deals</div>'+ev.map(d=>`<div class="gs-item" onclick="jump('xcmg')"><b>${esc(d.client)}</b> — ${esc(d.model)}<div class="sub">${esc(d.serial||"")} ${PESO((d.price||0)*(d.qty||0))}</div></div>`).join("");}
  if(rp.length){html+='<div class="gs-grp">Repair Job Orders</div>'+rp.map(j=>`<div class="gs-item" onclick="jump('jo')"><b>${esc(j.joNum||j.equip||"JO")}</b> — ${esc(j.bu||"")}<div class="sub">${esc(j.work||"")}</div></div>`).join("");}
  if(!html)html='<div class="gs-empty">No matches in synced data.</div>';
  box.innerHTML=html;box.classList.remove("hidden");
}
function jump(m){document.getElementById("gsResults").classList.add("hidden");document.getElementById("gs").value="";openModule(m);}
function esc(s){return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
document.addEventListener("click",e=>{if(!e.target.closest(".gsearch"))document.getElementById("gsResults").classList.add("hidden");});
</script>
</body>
</html>
